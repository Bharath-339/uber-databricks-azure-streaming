<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uber Databricks Event Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 700px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 40px;
            font-size: 14px;
        }

        .controls-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
        }

        label {
            display: block;
            margin-bottom: 10px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        input[type="number"] {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 14px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: border-color 0.3s;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        button {
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:active:not(:disabled) {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        button.stop-btn {
            background: linear-gradient(135deg, #ff6b6b 0%, #d63031 100%);
            display: none;
        }

        button.stop-btn.show {
            display: block;
        }

        button.send-btn {
            display: block;
        }

        button.send-btn.hide {
            display: none;
        }

        .status-box {
            margin-top: 30px;
            padding: 20px;
            border-radius: 5px;
            display: none;
            animation: slideIn 0.3s ease;
        }

        .status-box.show {
            display: block;
        }

        .status-box.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status-box.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status-box.info {
            background-color: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .status-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-text {
            flex: 1;
        }

        .status-stats {
            font-size: 12px;
            margin-top: 8px;
            opacity: 0.9;
        }

        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            margin-left: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .info-box {
            background-color: #e7f3ff;
            border-left: 4px solid #2196F3;
            padding: 15px;
            margin-top: 20px;
            border-radius: 3px;
            font-size: 13px;
            color: #0c5460;
        }

        .info-box h4 {
            margin-bottom: 8px;
            color: #0c5460;
        }

        .info-box p {
            margin: 4px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Uber Event Hub</h1>
        <p class="subtitle">Publish Uber ride data to Azure Event Hub</p>

        <div class="controls-section">
            <div class="control-group">
                <label for="frequency">Frequency (seconds):</label>
                <input
                    type="number"
                    id="frequency"
                    min="1"
                    max="300"
                    value="5"
                    placeholder="Enter frequency in seconds"
                />
            </div>

            <div class="control-group">
                <label for="batchSize">Batch Size:</label>
                <input
                    type="number"
                    id="batchSize"
                    min="1"
                    max="100"
                    value="1"
                    placeholder="Number of events per send"
                />
            </div>
        </div>

        <div class="button-group">
            <button type="button" id="sendBtn" class="send-btn">📤 Send Event</button>
            <button type="button" id="autoSendBtn">🔄 Start Auto-Send</button>
            <button type="button" id="stopBtn" class="stop-btn">⏹️ Stop Auto-Send</button>
        </div>

        <div class="status-box" id="statusBox">
            <div class="status-content">
                <div class="status-text">
                    <div id="statusMessage"></div>
                    <div class="status-stats" id="statusStats"></div>
                </div>
                <div class="spinner" id="statusSpinner" style="display: none;"></div>
            </div>
        </div>

        <div class="info-box">
            <h4>ℹ️ Info</h4>
            <p><strong>Frequency:</strong> Time between events in seconds (1-300)</p>
            <p><strong>Batch Size:</strong> Number of events to send at each interval (1-100)</p>
            <p><strong>Auto-Send:</strong> Continuously sends events at specified frequency</p>
        </div>
    </div>

    <script>
        const sendBtn = document.getElementById('sendBtn');
        const autoSendBtn = document.getElementById('autoSendBtn');
        const stopBtn = document.getElementById('stopBtn');
        const frequencyInput = document.getElementById('frequency');
        const batchSizeInput = document.getElementById('batchSize');
        const statusBox = document.getElementById('statusBox');
        const statusMessage = document.getElementById('statusMessage');
        const statusStats = document.getElementById('statusStats');
        const statusSpinner = document.getElementById('statusSpinner');

        let isAutoSending = false;
        let autoSendInterval = null;
        let totalEventsSent = 0;

        // Single send event
        sendBtn.addEventListener('click', async () => {
            await sendEvents(1);
        });

        // Start auto-send
        autoSendBtn.addEventListener('click', () => {
            isAutoSending = true;
            totalEventsSent = 0;
            autoSendBtn.disabled = true;
            frequencyInput.disabled = true;
            batchSizeInput.disabled = true;
            sendBtn.disabled = true;
            stopBtn.classList.add('show');

            showStatus('Auto-send started...', 'info', true);

            const frequency = parseInt(frequencyInput.value) * 1000; // Convert to ms
            const batchSize = parseInt(batchSizeInput.value);

            autoSendInterval = setInterval(() => {
                if (isAutoSending) {
                    sendEvents(batchSize);
                }
            }, frequency);
        });

        // Stop auto-send
        stopBtn.addEventListener('click', () => {
            isAutoSending = false;
            clearInterval(autoSendInterval);
            autoSendBtn.disabled = false;
            frequencyInput.disabled = false;
            batchSizeInput.disabled = false;
            sendBtn.disabled = false;
            stopBtn.classList.remove('show');
            statusSpinner.style.display = 'none';

            showStatus(`✓ Auto-send stopped. Total events sent: ${totalEventsSent}`, 'success', false);
        });

        async function sendEvents(count) {
            statusSpinner.style.display = 'block';
            showStatus(`Sending ${count} event${count > 1 ? 's' : ''}...`, 'info', true);

            try {
                const response = await fetch('/send-event', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ count: count })
                });

                const result = await response.json();

                if (response.ok) {
                    totalEventsSent += result.events_sent;
                    const msg = `✓ ${result.message} (Sent: ${result.events_sent})`;
                    showStatus(msg, 'success', false);

                    if (isAutoSending) {
                        statusStats.textContent = `Total events sent: ${totalEventsSent}`;
                        statusSpinner.style.display = 'block';
                    }
                } else {
                    showStatus(`✗ ${result.error}`, 'error', false);
                    if (isAutoSending) {
                        stopAutoSend();
                    }
                }
            } catch (error) {
                showStatus(`✗ Error: ${error.message}`, 'error', false);
                if (isAutoSending) {
                    stopAutoSend();
                }
            }
        }

        function stopAutoSend() {
            isAutoSending = false;
            clearInterval(autoSendInterval);
            autoSendBtn.disabled = false;
            frequencyInput.disabled = false;
            batchSizeInput.disabled = false;
            sendBtn.disabled = false;
            stopBtn.classList.remove('show');
            statusSpinner.style.display = 'none';
        }

        function showStatus(message, type, showSpinner = false) {
            statusMessage.textContent = message;
            statusBox.className = `status-box show ${type}`;
            statusSpinner.style.display = showSpinner ? 'block' : 'none';
        }
    </script>
</body>
</html>
